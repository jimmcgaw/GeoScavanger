version = "0.1.0"
source = { virtual = "." }
dependencies = [
    { name = "django" },
    { name = "django-environ" },
    { name = "django-extensions" },
    { name = "django-storages" },
    { name = "djangorestframework" },
    { name = "djangorestframework-simplejwt" },
    { name = "google-auth" },
    { name = "psycopg", extra = ["binary"] },
]

[package.optional-dependencies]
dev = [
    { name = "factory-boy" },
    { name = "ipython" },
    { name = "pytest-cov" },
    { name = "pytest-django" },
]
production = [
    { name = "gunicorn" },
]

[package.metadata]
requires-dist = [
    { name = "django", specifier = ">=5.0,<6" },
    { name = "django-environ", specifier = ">=0.11" },
    { name = "django-extensions", specifier = ">=4.1" },
    { name = "django-storages", specifier = ">=1.14" },
    { name = "djangorestframework", specifier = ">=3.15" },
    { name = "djangorestframework-simplejwt", specifier = ">=5.3" },
    { name = "factory-boy", marker = "extra == 'dev'", specifier = ">=3.3" },
    { name = "google-auth", specifier = ">=2.29" },
    { name = "gunicorn", marker = "extra == 'production'", specifier = ">=22.0" },
    { name = "ipython", marker = "extra == 'dev'", specifier = ">=8.24" },
    { name = "psycopg", extras = ["binary"], specifier = ">=3.1" },
    { name = "pytest-cov", marker = "extra == 'dev'", specifier = ">=5.0" },
    { name = "pytest-django", marker = "extra == 'dev'", specifier = ">=4.8" },
]
provides-extras = ["dev", "production"]

